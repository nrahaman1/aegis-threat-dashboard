<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AEGIS — US Agriculture Early Warning System</title>
  <meta name="description"
    content="Real-time global intelligence dashboard for early detection of threats to United States agriculture. Monitors climate stress, trade barriers, disease outbreaks, and shipping threats." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/index.css" />
</head>

<body>
  <!-- Top Navigation Bar -->
  <header id="top-bar">
    <div class="top-bar-left">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" width="28" height="28">
          <circle cx="16" cy="16" r="14" fill="none" stroke="url(#logoGrad)" stroke-width="2" />
          <path d="M16 4 L16 28 M4 16 L28 16 M8 8 L24 24 M24 8 L8 24" stroke="url(#logoGrad)" stroke-width="1"
            opacity="0.4" />
          <circle cx="16" cy="16" r="4" fill="url(#logoGrad)" />
          <defs>
            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00f0ff" />
              <stop offset="100%" stop-color="#7b2fff" />
            </linearGradient>
          </defs>
        </svg>
        <div class="logo-text">
          <span class="logo-name">AEGIS</span>
          <span class="logo-subtitle">Agriculture Early Warning</span>
        </div>
      </div>
    </div>
    <div class="top-bar-center">
      <div id="threat-level-badge" class="threat-badge threat-low">
        <span class="threat-pulse"></span>
        <span class="threat-label">AG RISK INDEX</span>
        <span id="threat-score" class="threat-score">--</span>
      </div>
    </div>
    <div class="top-bar-right">
      <div class="basemap-selector">
        <select id="basemap-select" title="Change basemap">
          <option value="dark" selected>Dark</option>
          <option value="light">Light</option>
          <option value="satellite">Satellite</option>
          <option value="terrain">Terrain</option>
        </select>
      </div>
      <div id="clock" class="clock"></div>
      <div id="data-status" class="data-status">
        <span class="status-dot status-loading"></span>
        <span class="status-text">Initializing...</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main id="app">
    <!-- Map Container (single div — deck.gl renders inside via MapboxOverlay) -->
    <div id="map-container"></div>

    <!-- Surveillance Radar Sweep Overlay -->
    <div id="radar-overlay" class="radar-overlay">
      <div class="radar-ring radar-ring-1"></div>
      <div class="radar-ring radar-ring-2"></div>
      <div class="radar-ring radar-ring-3"></div>
      <div class="radar-crosshair"></div>
      <div class="radar-sweep" id="radar-sweep"></div>
      <div class="radar-center-dot"></div>
      <div class="radar-countdown" id="radar-countdown">30</div>
    </div>

    <!-- Detail Popup (shown when clicking map features) -->
    <div id="detail-popup" class="detail-popup hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar open">
      <div class="sidebar-toggle" id="sidebar-toggle">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" fill="none" />
        </svg>
      </div>

      <!-- Layer Controls -->
      <section class="sidebar-section" id="layer-controls">
        <h2 class="section-title">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5"
              fill="none" />
          </svg>
          Data Layers
        </h2>
        <div class="layers-grid">
          <label class="layer-toggle active" data-layer="climate">
            <input type="checkbox" checked />
            <span class="layer-icon" style="color: #ff6b35">◆</span>
            <span class="layer-name">Climate Stress</span>
            <span class="layer-badge" id="climate-count">--</span>
          </label>
          <label class="layer-toggle active" data-layer="wto">
            <input type="checkbox" checked />
            <span class="layer-icon" style="color: #ffd23f">▲</span>
            <span class="layer-name">WTO SPS Barriers</span>
            <span class="layer-badge" id="wto-count">--</span>
          </label>
          <label class="layer-toggle active" data-layer="foodsec">
            <input type="checkbox" checked />
            <span class="layer-icon" style="color: #ee4266">✚</span>
            <span class="layer-name">Food Security News</span>
            <span class="layer-badge" id="foodsec-count">--</span>
          </label>
          <label class="layer-toggle active" data-layer="hungermap">
            <input type="checkbox" checked />
            <span class="layer-icon" style="color: var(--hungermap-color)">■</span>
            <span class="layer-name">WFP HungerMap</span>
            <span class="layer-badge" id="hungermap-count">--</span>
          </label>
          <label class="layer-toggle active" data-layer="shipping">
            <input type="checkbox" checked />
            <span class="layer-icon" style="color: #3bceac">⟿</span>
            <span class="layer-name">AIS Shipping</span>
            <span class="layer-badge" id="shipping-count">--</span>
          </label>
        </div>
      </section>

      <!-- Threat Summary Panel -->
      <section class="sidebar-section" id="threat-summary">
        <h2 class="section-title">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <path d="M12 9v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="1.5"
              fill="none" />
          </svg>
          Threat Summary
        </h2>
        <div id="threat-cards" class="threat-cards">
          <!-- Dynamically populated -->
        </div>
      </section>

      <!-- Live Feed Panel -->
      <section class="sidebar-section" id="live-feed-section">
        <h2 class="section-title">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <path d="M13 10V3L4 14h7v7l9-11h-7z" stroke="currentColor" stroke-width="1.5" fill="none" />
          </svg>
          Live Alert Feed
          <span class="live-dot"></span>
        </h2>
        <div id="alert-feed" class="alert-feed">
          <div class="feed-placeholder">Loading alerts...</div>
        </div>
      </section>
    </aside>
  </main>

  <!-- Bottom Ticker -->
  <footer id="ticker-bar">
    <div class="ticker-label">⚠ ALERTS</div>
    <div class="ticker-track">
      <div id="ticker-content" class="ticker-content">
        Initializing data feeds... Connecting to Open-Meteo ERA5 • WTO ePing • FAO GIEWS • NASA EONET...
      </div>
    </div>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
